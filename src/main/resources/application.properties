# ============================================================
# THE MC HUB - Application Configuration
# ✅ Secret variables are loaded AUTOMATICALLY from the .env file
#    (via Dotenv initialization in TheMCHubApplication.java)
# ============================================================

# Server settings
server.port=${PORT:5000}

# ============================================================
# MongoDB Atlas - Cluster: MainDatabase
# URI is read from MONGODB_URI in the .env file
# Format: mongodb+srv://<user>:<pass>@<host>/<dbname>?...
# ============================================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/voice-tranning}

# Database name (can be overridden separately if URI does not contain dbname)
spring.data.mongodb.database=${MONGODB_DATABASE:voice-tranning}

# Connection pool settings (Optimized for MongoDB Atlas)
spring.data.mongodb.auto-index-creation=false

# Elasticsearch (BM25-backed lesson search with Mongo fallback)
spring.elasticsearch.uris=${ELASTICSEARCH_URIS:http://localhost:9200}

# Application & Security
# No fallback — app must fail to start if JWT_SECRET is missing (see JwtServiceImpl @PostConstruct check)
mchub.jwt.secret=${JWT_SECRET:}
mchub.jwt.expiration=86400000

# Google Sign-In — OAuth client ID from Google Cloud Console (Web application type).
# Empty = Google login endpoint rejects every request (see GoogleTokenVerifierServiceImpl).
mchub.google.client-id=${GOOGLE_CLIENT_ID:}

# Cloudinary (Used for Media Service)
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api_key=${CLOUDINARY_API_KEY:}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:}

# Supabase Storage (Used for CV upload)
supabase.url=${SUPABASE_URL:}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.cv-bucket=${SUPABASE_CV_BUCKET:cv-documents}

# PayOS Settings
mchub.payos.client-id=${PAYOS_CLIENT_ID:}
mchub.payos.api-key=${PAYOS_API_KEY:}
mchub.payos.checksum-key=${PAYOS_CHECKSUM_KEY:}

# MBBank VietQR Settings
mchub.payment.bank-id=MBBank
mchub.payment.account-no=${MBBANK_ACCOUNT_NO:190356789999}
mchub.payment.account-name=${MBBANK_ACCOUNT_NAME:THE MC HUB ACADEMY}
mchub.payment.amount=${PAYMENT_AMOUNT:20000}
mchub.payment.memo-prefix=${PAYMENT_MEMO_PREFIX:MCHUBPREMIUM}

# Admin 2FA OTP destination emails (loaded from .env)
mchub.admin.otp.email.1=${ADMIN_OTP_EMAIL_1:}
mchub.admin.otp.email.2=${ADMIN_OTP_EMAIL_2:}
mchub.admin.otp.email.3=${ADMIN_OTP_EMAIL_3:}
mchub.admin.otp.email.4=${ADMIN_OTP_EMAIL_4:}
mchub.admin.otp.email.5=${ADMIN_OTP_EMAIL_5:}
mchub.admin.otp.email.6=${ADMIN_OTP_EMAIL_6:}

# CORS & Global
mchub.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
mchub.cors.vercel-preview-patterns=${VERCEL_PREVIEW_PATTERNS:}
mchub.fe-url=${FE_URL:http://localhost:5173}

# AI Service (HuggingFace on prod, local Python on dev)
ai.service.analyze-url=${AI_ANALYZE_URL:http://127.0.0.1:8001/analyze-voice}
ai.service.tts-url=${AI_TTS_URL:http://127.0.0.1:8001/generate-mc-voice}

# ============================================================
# Logging
# ============================================================
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.mongodb.driver.cluster=INFO
logging.level.org.mongodb.driver.connection=INFO
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR
logging.level.com.mchub=DEBUG


# Multipart File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# Email Settings (Brevo SMTP)
# ============================================================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${BREVO_SMTP_KEY:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:themchubtraining@gmail.com}

# ============================================================
# One-time DB migration tool (Admin -> POST /admin/migrate-db)
# Disabled by default. Source/target DB must be set explicitly
# via env vars — no hardcoded default, to avoid accidentally
# touching production or the currently-active database.
# ============================================================
mchub.migration.enabled=${MIGRATION_ENABLED:false}
mchub.migration.source-db=${MIGRATION_SOURCE_DB:}
mchub.migration.target-db=${MIGRATION_TARGET_DB:}

