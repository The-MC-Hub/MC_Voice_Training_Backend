spring.data.mongodb.auto-index-creation=false
spring.data.mongodb.uri=mongodb://localhost:27017/mchub_test

# Disable dotenv loading in tests
spring.config.import=optional:file:.env[.properties]

# JWT secret for tests
mchub.jwt.secret=test-secret-key-for-unit-tests-very-long-value
mchub.jwt.expiration=86400000

# Disable security auto-config clashing in WebMvcTest
spring.security.user.name=test
spring.security.user.password=test
